<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA4: TaskApp</title>

    <!-- JavaScript invocation script-->
    <script defer src="index.js"></script>
</head>

<body>

    <!--User form for getting all required inputs -->
    <form id="Form">
        <input id="Description" type="text" placeholder="Enter task name or description" />

        <select id="categoryDropdown">
            <option value="" disabled selected>--Select Category--</option>
            <option value="Work">Work</option>
            <option value="Home">Home</option>
            <option value="Family">Family</option>
            <option value="Health & Wellness">Health & Wellness</option>
        </select>


        <input type="date" id="dueDate" name="taskDueDate" />

        <select id="statusDropdown">
            <option value="" disabled selected>--Select Status--</option>
            <option  value="Not Started">Not Started</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
        </select>

        <button id="submitTask" type="button">Add Task</button>
    </form>

    <!-- Output task list here-->
    <p id="output"></p>

</body>

</html>
