<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA4: TaskApp</title>

    <!-- JavaScript invocation script-->
    <script defer src="index.js"></script>

    <!--Bootstrap invocation script-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!--Link to style sheet-->
    <link rel="stylesheet" src="styles.css">
</head>

<body class="container-fluid">
    <header class="d-flex flex-column justify-content-center align-items-center">
        <img src="AdobeStock_1596112825.svg" width="auto" height="100">
            <h1>TaskApp</h1>
        <p>Getting the "TO DO" out of your head</p>
    </header>

    <form id="Form" class="container-fluid bg-light">
        <div class="container-fluid d-flex justify-content-center align-items-center vh-25">
            <div class="row w-100 mb-4 p-5">
                <div class="col-12 col-md-3 mb-2 justify-content-center align-items-center">

                    <!-- Get task name or description-->
                    <input id="Description" type="text" class="form-control" placeholder="Task name or description" required />
                </div>

                <div class="col-12 col-md-3 mb-2 justify-content-center align-items-center">
                    <!-- Get category for the task-->
                    <select class="form-select"id="categoryDropdown" required>
                        <option value="" disabled selected>--Select Category--</option>
                        <option value="Work">Work</option>
                        <option value="Home">Home</option>
                        <option value="Family">Family</option>
                        <option value="Health & Wellness">Health & Wellness</option>
                    </select>
                </div>


                <div class="col-12 col-md-2 mb-2">
                    <!-- Get task deadline-->
                    <input type="date" id="dueDate" class="form-control" name="taskDueDate" required />
                </div>

                <div class="col-12 col-md-2 mb-2 justify-content-center align-items-center">
                    <div id="statusButtons" class="d-flex flex-column gap-1">

                        <label class="d-flex align-items-center gap-2">
                            <input type="radio" name="status" value="Not Started">
                            <span>Not Started</span>
                        </label>

                        <label class="d-flex align-items-center gap-2">
                            <input type="radio" name="status" value="In Progress">
                            <span>In Progress</span>
                        </label>

                        <label class="d-flex align-items-center gap-2">
                            <input type="radio" name="status" value="Completed">
                            <span>Completed</span>
                        </label>

                    </div>
                </div>

                <div class="col-12 col-md-2 mb-2">
                    <button class="form-control" type="submit" id="submitTask" type="button">Add Task</button>
                </div>

            </div>
        </div>
    </form>

    <!--Column headers for dynamic output-->
    <section>
        <div class="row w-100 p-5">
            <div class="col-md-2 d-none d-md-flex" >
                <h5>Description</h5>
            </div>
            <div class="col-md-2 d-none d-md-flex">
                <h5>Category</h5>
            </div>
            <div class="col-md-2 d-none d-md-flex">
                <h5>Deadline</h5>
            </div>
            <div id="updateStatus" class="col-md-2 d-none d-md-flex">
                <h5>Status</h5>
            </div>
            <div class="col-md-2 d-none d-md-flex">
                <h5>Alert</h5>
            </div>
            <select id="filterDropdown" class="col-md-2 d-flex text-center">
                 <option value="" disabled selected hidden>Filter by...</option>

            </select>
        </div>

        <!-- Display task list items here-->
        <p id="output" class="bg-light justify-content-center align-items-center p-5"></p>
    </section>

</body>

</html>
