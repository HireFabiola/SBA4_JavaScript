<body>

    <!--User form for getting all required inputs -->
    <form id="taskForm">
        <input id="taskItem" type="text" placeholder="Enter task name or description" />

        <select id="categoryDropdown">
            <option value="" disabled selected>--Select an option--</option>
            <option value="option1">Work</option>
            <option value="option2">Home</option>
            <option value="option3">Family</option>
            <option value="option3">Health & Wellness</option>
        </select>

        <input type="date" id="taskDueDate" name="taskDueDate" />

        <select id="progressDropdown">
            <option value="" disabled selected>--Not Started--</option>
            <option value="option1">In Progress</option>
            <option value="option2">Completed</option>
        </select>

        <button type="submit">Add Task</button>
    </form>
    <p id="output"></p>

</body>
