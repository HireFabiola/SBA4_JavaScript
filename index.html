<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA4: TaskApp</title>

    <!-- JavaScript invocation script-->
    <script defer src="index.js"></script>

    <!--Bootstrap invocation script-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!--Link to style sheet-->
    <link rel="stylesheet" src="styles.css">
</head>

<body>

    <header class="d-flex flex-column align-items-center">
        <div><img src="AdobeStock_1596112825.svg" width="auto" height="100">
        <h1>TaskApp</h1></div>
        <p>Getting the "TO DO" out of your head</p>
        
    </header>
    <form id="Form">
        <div class="formContainer d-flex justify-content-center align-items-center vh-25">
            <div class="row w-100 mb-4 p-5">
                <div class="col-3">
                    <!-- Get task name or description-->
                    <input id="Description" type="text" placeholder="Enter task name or description" required />
                </div>

                <div class="col-3 justify-content-center align-items-center">
                    <!-- Get category for the task-->
                    <select id="categoryDropdown" required>
                        <option value="" disabled selected>--Select Category--</option>
                        <option value="Work">Work</option>
                        <option value="Home">Home</option>
                        <option value="Family">Family</option>
                        <option value="Health & Wellness">Health & Wellness</option>
                    </select>
                </div>


                <div class="col-2">
                    <!-- Get task deadline-->
                    <input type="date" id="dueDate" name="taskDueDate" required />
                </div>

                <div class="col-2">
                    <div id="statusButtons" class="d-flex flex-column gap-1">

                        <label class="d-flex align-items-center gap-2">
                            <input type="radio" name="status" value="Not Started">
                            <span>Not Started</span>
                        </label>

                        <label class="d-flex align-items-center gap-2">
                            <input type="radio" name="status" value="In Progress">
                            <span>In Progress</span>
                        </label>

                        <label class="d-flex align-items-center gap-2">
                            <input type="radio" name="status" value="Completed">
                            <span>Completed</span>
                        </label>

                    </div>
                </div>

                <div class="col-2">
                    <button type="submit" id="submitTask" type="button">Add Task</button>
                </div>

            </div>
        </div>
    </form>

    <section>
        <div class="row w-100">
            <div class="col-2">
                <h5>Description</h5>
            </div>
            <div class="col-2">
                <h5>Category</h5>
            </div>
            <div class="col-2">
                <h5>Deadline</h5>
            </div>
            <div class="col-2">
                <h5>Status</h5>
                <div id="updatedButtons"></div>
            </div>
            <div class="col-2">
                <h5>Alert</h5>
            </div>
            <div class="col-2">
                <h5>Filter</h5>
            </div>
        </div>

        <p id="output"></p>
    </section>

</body>

</html>
