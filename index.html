<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBA4: TaskApp</title>

    <!-- JavaScript invocation script-->
    <script defer src="index.js"></script>

    <!--Bootstrap invocation script-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>

    <!--User form for getting all required inputs -->
    <form id="Form">

        <!-- Get task name or description-->
        <input id="Description" type="text" placeholder="Enter task name or description" required />

        <!-- Get category for the task-->
        <select id="categoryDropdown" required>
            <option value="" disabled selected>--Select Category--</option>
            <option value="Work">Work</option>
            <option value="Home">Home</option>
            <option value="Family">Family</option>
            <option value="Health & Wellness">Health & Wellness</option>
        </select>

        <!-- Get task deadline-->
        <input type="date" id="dueDate" name="taskDueDate" required />

        <!--Get task progress status-->
        <div id="statusButtons">
            <input type="radio" name="status" value="Not Started"> Not Started</inp
            <input type="radio" name="status" value="In Progress"> In progress
            <input type="radio" name="status" value="Completed"> Completed
        </div>
        
       <button type="submit" id="submitTask" type="button">Add Task</button>
    </form>

    <!-- Output task list here-->
    <p id="output"></p>
<section>
    <div class="row w-100">
        <div class="col-2">
            <h4>Description</h4>
        </div>
        <div class="col-2">
            <h4>Category</h4>
        </div>
        <div class="col-2">
            <h4>Deadline</h4>
        </div>
        <div class="col-2">
            <h4>Status</h4>
        </div>
        <div class="col-2">
            <h4>Filter</h4>
        </div>
        <div class="col-2">
            <h4>Message</h4>
        </div>
    </div>
</section>
</body>

</html>
